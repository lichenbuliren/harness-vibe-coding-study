<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Harness + Vibe Coding Project Architecture</title>
  <desc id="desc">Business technology style architecture diagram for the Agent-First Living Lab, showing project OS, harness core, lab validation, evidence, and reusable outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1f35"/>
      <stop offset="1" stop-color="#0b1728"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05 0 0 0 0 0.85 0 0 0 0 0.78 0 0 0 .55 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2dd4bf"/>
    </marker>
    <marker id="arrow-gold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#f6c453"/>
    </marker>
    <style>
      .bg { fill: url(#bg); }
      .grid { stroke: #1f3b5a; stroke-width: 1; opacity: .22; }
      .panel { fill: url(#panel); stroke: #2dd4bf; stroke-width: 1.8; rx: 18; }
      .panel-blue { fill: #0d2038; stroke: #3b82f6; stroke-width: 1.8; rx: 18; }
      .panel-gold { fill: #1f1a10; stroke: #f6c453; stroke-width: 1.8; rx: 18; }
      .card { fill: #101f33; stroke: #385675; stroke-width: 1.3; rx: 12; }
      .card-soft { fill: #13263d; stroke: #2b4968; stroke-width: 1.1; rx: 10; }
      .accent { fill: #2dd4bf; }
      .gold { fill: #f6c453; }
      .blue { fill: #60a5fa; }
      .green { fill: #4ade80; }
      .text { fill: #f8fafc; font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .muted { fill: #9fb3c8; font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .dim { fill: #6f8aa6; font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .mono { fill: #c7d2fe; font-family: "SFMono-Regular", Consolas, monospace; letter-spacing: 0; }
      .title { font-size: 54px; font-weight: 850; }
      .subtitle { font-size: 23px; font-weight: 500; }
      .h1 { font-size: 27px; font-weight: 800; }
      .h2 { font-size: 21px; font-weight: 760; }
      .body { font-size: 18px; font-weight: 560; }
      .small { font-size: 15px; font-weight: 520; }
      .tiny { font-size: 13px; font-weight: 520; }
      .line { stroke: #2dd4bf; stroke-width: 3.2; fill: none; marker-end: url(#arrow-teal); }
      .line-gold { stroke: #f6c453; stroke-width: 3.2; fill: none; marker-end: url(#arrow-gold); }
      .line-soft { stroke: #52708f; stroke-width: 2; fill: none; stroke-dasharray: 7 7; }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1120"/>
  <g opacity=".55">
