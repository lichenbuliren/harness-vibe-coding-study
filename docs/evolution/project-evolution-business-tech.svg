  <circle cx="1228" cy="372" r="116" fill="#0b1728" stroke="#f6c453" stroke-width="2.4" filter="url(#glow)"/>
  <text class="text h2" x="1228" y="344" text-anchor="middle">问题信号</text>
  <text class="muted small" x="1228" y="374" text-anchor="middle">feedback / failure</text>
  <text class="gold h2" x="1228" y="410" text-anchor="middle">标准升级入口</text>
