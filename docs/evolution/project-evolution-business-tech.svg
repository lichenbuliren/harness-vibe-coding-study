    <circle class="gold" cx="1546" cy="293" r="20"/><text class="text h2" x="1546" y="301" text-anchor="middle">4</text>
    <text class="text body" x="1580" y="288">测试验证</text>
    <text class="dim tiny" x="1580" y="314">证明有效性</text>

    <rect class="card" x="1286" y="444" width="190" height="78" rx="14"/>
    <circle class="gold" cx="1318" cy="483" r="20"/><text class="text h2" x="1318" y="491" text-anchor="middle">5</text>
    <text class="text body" x="1352" y="478">evolution 记录</text>
    <text class="dim tiny" x="1352" y="504">记录来源与结论</text>

    <rect class="card" x="1008" y="444" width="190" height="78" rx="14"/>
    <circle class="gold" cx="1040" cy="483" r="20"/><text class="text h2" x="1040" y="491" text-anchor="middle">6</text>
    <text class="text body" x="1074" y="478">分享复用</text>
    <text class="dim tiny" x="1074" y="504">沉淀资产 / 团队复用</text>
  </g>
  <path class="line-gold" d="M970 292 C998 244 1010 244 1008 260"/>
  <path class="line-gold" d="M1198 260 H1270"/>
  <path class="line-gold" d="M1476 260 C1514 260 1518 266 1514 292"/>
  <path class="line-gold" d="M1608 332 C1608 430 1480 480 1490 482"/>
  <path class="line-gold" d="M1286 483 H1214"/>
  <path class="line-gold" d="M1008 483 C900 468 820 382 838 338"/>

