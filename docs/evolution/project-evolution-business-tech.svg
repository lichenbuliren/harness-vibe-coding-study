  <path class="line-dash" d="M254 806 H266 M436 806 H448 M618 806 H630 M800 806 H812 M982 806 H994 M1164 806 H1176 M1346 806 H1358 M1528 806 H1540"/>

  <rect class="card" x="132" y="918" width="1530" height="44" rx="12"/>
  <text class="muted small" x="900" y="947" text-anchor="middle">演进逻辑：项目结构先让 Agent 可工作；真实 Lab 让方法经受验证；用户反馈触发标准捕获；标准再进入模板、playbook 和未来 skill。</text>
