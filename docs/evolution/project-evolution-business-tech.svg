  <g transform="translate(84 240)">
    <rect class="card-teal" x="0" y="0" width="538" height="84" rx="14"/>
    <text class="text h2" x="28" y="34">1. 方法论学习</text>
    <text class="muted small" x="28" y="62">Foundations / Guardrails / Context / Specs / Evals / Benchmarks</text>
    <rect class="card-teal" x="0" y="112" width="538" height="84" rx="14"/>
    <text class="text h2" x="28" y="146">2. 真实 Lab 验证</text>
    <text class="muted small" x="28" y="174">Dinner Picker MVP / mobile LAN / feedback redraw / Chrome MCP</text>
    <rect class="card-teal" x="0" y="224" width="538" height="84" rx="14"/>
    <text class="text h2" x="28" y="258">3. 工程资产抽取</text>
    <text class="muted small" x="28" y="286">Standards / Playbooks / Handoffs / Templates / Skill candidates</text>
  </g>

  <rect class="panel-gold" x="706" y="162" width="1046" height="408" rx="18"/>
