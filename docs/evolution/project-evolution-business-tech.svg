    <text class="muted tiny" x="842" y="790">真实使用</text>
    <text class="muted tiny" x="842" y="816">发现问题</text>
    <text class="muted tiny" x="842" y="842">反馈进入闭环</text>

    <rect class="card-gold" x="1002" y="710" width="162" height="170" rx="14"/>
    <circle class="gold" cx="1030" cy="746" r="12"/><text class="text tiny" x="1030" y="751" text-anchor="middle">6</text>
