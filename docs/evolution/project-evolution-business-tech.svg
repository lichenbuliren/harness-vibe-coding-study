<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" role="img" aria-labelledby="title desc">
  <title id="title">Harness + Vibe Coding Evolution and Learning Loop</title>
  <desc id="desc">Business technology style evolution diagram showing the standard capture loop and nine-stage project evolution path.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset=".58" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 .07 0 0 0 0 .78 0 0 0 0 .72 0 0 0 .48 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#2dd4bf"/></marker>
    <marker id="arrow-gold" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#f6c453"/></marker>
    <style>
      .bg { fill: url(#bg); }
      .grid { stroke: #1f3b5a; stroke-width: 1; opacity: .20; }
      .panel { fill: #0d1d31; stroke: #2dd4bf; stroke-width: 1.8; rx: 18; }
      .panel-gold { fill: #1e1a11; stroke: #f6c453; stroke-width: 1.8; rx: 18; }
      .card { fill: #101f33; stroke: #385675; stroke-width: 1.3; rx: 13; }
      .card-teal { fill: #0e2a34; stroke: #2dd4bf; stroke-width: 1.4; rx: 13; }
      .card-gold { fill: #2a2414; stroke: #f6c453; stroke-width: 1.4; rx: 13; }
      .text { fill: #f8fafc; font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .muted { fill: #a6b8ca; font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .dim { fill: #7891aa; font-family: Inter, "PingFang SC", "Microsoft YaHei", Arial, sans-serif; letter-spacing: 0; }
      .title { font-size: 54px; font-weight: 850; }
      .subtitle { font-size: 23px; font-weight: 500; }
      .h1 { font-size: 28px; font-weight: 820; }
      .h2 { font-size: 21px; font-weight: 760; }
      .body { font-size: 18px; font-weight: 560; }
      .timeline-title { font-size: 16px; font-weight: 650; }
      .small { font-size: 15px; font-weight: 520; }
      .tiny { font-size: 13px; font-weight: 520; }
      .teal { fill: #2dd4bf; }
      .gold { fill: #f6c453; }
      .blue { fill: #60a5fa; }
      .green { fill: #4ade80; }
      .line { stroke: #2dd4bf; stroke-width: 3; fill: none; marker-end: url(#arrow-teal); }
      .line-gold { stroke: #f6c453; stroke-width: 3; fill: none; marker-end: url(#arrow-gold); }
      .line-dash { stroke: #6f8aa6; stroke-width: 2.4; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrow-teal); }
    </style>
  </defs>

  <rect class="bg" width="1800" height="1120"/>
  <g opacity=".55">
    <path class="grid" d="M0 80 H1800 M0 160 H1800 M0 240 H1800 M0 320 H1800 M0 400 H1800 M0 480 H1800 M0 560 H1800 M0 640 H1800 M0 720 H1800 M0 800 H1800 M0 880 H1800 M0 960 H1800 M0 1040 H1800"/>
    <path class="grid" d="M80 0 V1120 M160 0 V1120 M240 0 V1120 M320 0 V1120 M400 0 V1120 M480 0 V1120 M560 0 V1120 M640 0 V1120 M720 0 V1120 M800 0 V1120 M880 0 V1120 M960 0 V1120 M1040 0 V1120 M1120 0 V1120 M1200 0 V1120 M1280 0 V1120 M1360 0 V1120 M1440 0 V1120 M1520 0 V1120 M1600 0 V1120 M1680 0 V1120"/>
  </g>

  <text class="text title" x="900" y="76" text-anchor="middle">Harness + Vibe Coding 演进图</text>
  <text class="muted subtitle" x="900" y="116" text-anchor="middle">从方法论学习到真实项目验证，再到标准捕获、模板复用与未来 Skill 化</text>

  <rect class="panel" x="48" y="162" width="610" height="408" rx="18" filter="url(#glow)"/>
